name: Daily Food Inspection Crawler

on:
  schedule:
    # Runs at 07:00 UTC every day (which is 08:00 AM CET / 09:00 AM CEST)
    - cron: '0 7 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually!

permissions:
  contents: write # Needed so the bot can save the state file back to the repo

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Crawler
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python food_crawler.py

      - name: Commit and push state file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add crawler_state.json
          # Only commit if the crawler_state.json file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update crawler state" && git push)

